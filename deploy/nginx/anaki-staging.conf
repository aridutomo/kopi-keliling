# Nginx reverse proxy — STAGING
# Ganti STG_DOMAIN dengan subdomain staging (mis. staging.anakicoffee.com).
# Letakkan di /etc/nginx/sites-available/anaki-staging lalu symlink ke sites-enabled.
# Certbot (--nginx) akan otomatis menambahkan blok HTTPS (listen 443) + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name STG_DOMAIN;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:7002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
