# Nginx reverse proxy — PRODUCTION
# Ganti PROD_DOMAIN dengan domain aslimu (mis. anakicoffee.com).
# Letakkan di /etc/nginx/sites-available/anaki-prod lalu symlink ke sites-enabled.
# Certbot (--nginx) akan otomatis menambahkan blok HTTPS (listen 443) + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name PROD_DOMAIN;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:7001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
